name: Build

on:
  release:
    types: [published]

jobs:
  build:
    permissions:
      contents: write # for uploading release assets
    
    env:
      SOURCE_TAG: ${{ github.event.release.tag_name }}
      ARTIFACT: "llamacpp-${{ matrix.jobs.name }}.tar.gz"

    strategy:
      fail-fast: false
      matrix:
        jobs:
          - name: amd64
            runs-on: ubuntu-24.04

          - name: arm64
            runs-on: ubuntu-24.04-arm

          #
          # Builds with CUDA backend
          #
          - name: amd64+cuda12
            runs-on: ubuntu-24.04
            additional-cmake-flags: "-D GGML_CUDA=ON"
            cuda-toolkit: true

          - name: arm64+cuda12
            runs-on: ubuntu-24.04-arm
            additional-cmake-flags: "-D GGML_CUDA=ON"
            cuda-toolkit: true

          #
          # Builds with Rocm backend
          #
          - name: amd64+rocm
            runs-on: ubuntu-24.04
            additional-cmake-flags: '-DCMAKE_C_COMPILER=/usr/bin/gcc-14
                                      -DCMAKE_CXX_COMPILER=/usr/bin/g++-14
                                      -DCMAKE_CXX_FLAGS="-I/opt/rocm/include"
                                      -DCMAKE_CROSSCOMPILING=ON
                                      -DCMAKE_BUILD_TYPE=Release
                                      -DGPU_TARGETS="gfx1010;gfx1011;gfx1012;gfx1030;gfx1031;gfx1032;gfx1100;gfx1101;gfx1102;gfx1150;gfx1151;;gfx1152;gfx1153;gfx1200;gfx1201"
                                      -DBUILD_SHARED_LIBS=ON
                                      -DGGML_HIP=ON
                                      -DGGML_OPENMP=OFF
                                      -DGGML_CUDA_FORCE_CUBLAS=OFF
                                      -DGGML_HIP_ROCWMMA_FATTN=OFF
                                      -DLLAMA_CURL=OFF
                                      -DGGML_STATIC=OFF
                                      -DCMAKE_SYSTEM_NAME=Linux
                                      -DCMAKE_SYSTEM_PROCESSOR=x86_64'
            rocm: true
            build-with-ninja: true

          
    runs-on: ${{ matrix.jobs.runs-on }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        with:
          detached: true
      - name: Sanitize SOURCE_TAG and set target_ref output
        id: target_ref
        run: |
          # Sanitize SOURCE_TAG by removing any build metadata (after '+') and 'git.' prefix if present
          target_ref="${SOURCE_TAG%%+*}"
          target_ref="${target_ref#git.}"
          if [ -z "$target_ref" ]; then
            echo "target_ref is empty after sanitization: '$SOURCE_TAG'"
            exit 1
          fi
          echo "value=$target_ref" >> "$GITHUB_OUTPUT"

      - name: Clone llama.cpp
        uses: actions/checkout@v6
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ steps.target_ref.outputs.value }}
          fetch-depth: 0

      - name: Install dependencies
        run: |
          # Install CUDA toolkit if required
          if [ "${{ matrix.jobs.cuda-toolkit }}" = "true" ]; then
            case "$(dpkg --print-architecture)" in
              amd64)
                wget https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
                ;;
              arm64)
                wget https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/sbsa/cuda-keyring_1.1-1_all.deb
                ;;
              *)
                echo "Unsupported architecture for CUDA Toolkit installation"
                exit 1
              ;;
            esac
          
            sudo dpkg -i cuda-keyring_1.1-1_all.deb
            sudo apt-get -qq update
            sudo apt-get -qq install cuda-toolkit-12-9
          else
            sudo apt-get -qq update
          fi
          
          sudo apt-get -qq install build-essential
          
          # Update to gcc 14 - see https://github.com/ggml-org/llama.cpp/issues/17403#issuecomment-3562034750
          sudo apt-get -qq install gcc-14
          sudo apt-get -qq install g++-14
          sudo snap install cmake --classic

          # Install ROCm if required
          if [ "${{ matrix.jobs.rocm }}" = "true" ]; then
            echo "=== ROCm diagnostics: pre-install state ==="
            if [ -d /opt/rocm ]; then
              du -sh /opt/rocm /opt/rocm/lib /opt/rocm/lib64 /opt/rocm/lib/rocblas/library /opt/rocm/lib/hipblaslt/library 2>/dev/null || true
            else
              echo "/opt/rocm does not exist yet"
            fi
            wget https://repo.radeon.com/amdgpu-install/7.2/ubuntu/noble/amdgpu-install_7.2.70200-1_all.deb
            sudo apt-get -qq install ./amdgpu-install_7.2.70200-1_all.deb
            sudo apt-get -qq update
            sudo apt-get -qq install python3-setuptools python3-wheel
            sudo usermod -a -G render,video $LOGNAME # Add the current user to the render and video groups
            sudo apt-get -qq install rocm
            sudo apt-get -qq install ninja-build git
            wget https://therock-nightly-tarball.s3.amazonaws.com/therock-dist-linux-gfx101X-dgpu-7.12.0a20260311.tar.gz
            wget https://therock-nightly-tarball.s3.amazonaws.com/therock-dist-linux-gfx103X-dgpu-7.12.0a20260311.tar.gz
            wget https://therock-nightly-tarball.s3.amazonaws.com/therock-dist-linux-gfx110X-all-7.12.0a20260311.tar.gz
            wget https://therock-nightly-tarball.s3.amazonaws.com/therock-dist-linux-gfx120X-all-7.12.0a20260311.tar.gz
            wget https://therock-nightly-tarball.s3.amazonaws.com/therock-dist-linux-gfx1150-7.12.0a20260311.tar.gz
            wget https://therock-nightly-tarball.s3.amazonaws.com/therock-dist-linux-gfx1151-7.12.0a20260311.tar.gz
            wget https://therock-nightly-tarball.s3.amazonaws.com/therock-dist-linux-gfx1152-7.12.0a20260311.tar.gz
            wget https://therock-nightly-tarball.s3.amazonaws.com/therock-dist-linux-gfx1153-7.12.0a20260311.tar.gz
            # Loop through every file ending in .tar.gz in the current directory
            for archive in *.tar.gz; do
                # Check if any files actually exist to avoid errors
                [ -e "$archive" ] || continue

                echo "Processing: $archive"
                
                # Run the extraction command
                sudo tar -xzf "$archive" -C /opt/rocm --strip-components=1
            done

            echo "=== ROCm diagnostics: post-extraction state ==="
            du -sh /opt/rocm /opt/rocm/lib /opt/rocm/lib64 /opt/rocm/lib/llvm/lib /opt/rocm/lib/rocm_sysdeps/lib /opt/rocm/lib/rocblas/library /opt/rocm/lib/hipblaslt/library 2>/dev/null || true
            echo "rocblas files: $(find /opt/rocm/lib/rocblas/library -type f 2>/dev/null | wc -l || true)"
            echo "hipblaslt files: $(find /opt/rocm/lib/hipblaslt/library -type f 2>/dev/null | wc -l || true)"
          fi

      - name: Build
        run: |
          common_flags="-D GGML_NATIVE=OFF -D GGML_BACKEND_DL=ON  -D GGML_CPU_ALL_VARIANTS=ON"
          artifacts_flags="-D LLAMA_BUILD_TESTS=OFF -D LLAMA_BUILD_EXAMPLES=OFF -D LLAMA_BUILD_TOOLS=ON -D LLAMA_BUILD_SERVER=ON"
          
          # Set gcc-14 as the compiler
          export CC=/usr/bin/gcc-14
          export CXX=/usr/bin/g++-14
          
          # Set CUDA compiler for CUDA builds
          export CUDACXX=/usr/local/cuda/bin/nvcc
          # if present, remove build directory to ensure a clean build with ninja
          # Set ROCm environment variables for ROCm builds 
          export HIP_PATH=/opt/rocm
          export ROCM_PATH=/opt/rocm
          export HIP_PLATFORM=amd
          export HIP_CLANG_PATH=/opt/rocm/llvm/bin
          export HIP_INCLUDE_PATH=/opt/rocm/include
          export HIP_LIB_PATH=/opt/rocm/lib
          export HIP_DEVICE_LIB_PATH=/opt/rocm/lib/llvm/amdgcn/bitcode
          export PATH=/opt/rocm/bin:/opt/rocm/llvm/bin:$PATH
          export LD_LIBRARY_PATH=/opt/rocm/lib:/opt/rocm/lib64:/opt/rocm/llvm/lib:${LD_LIBRARY_PATH:-}
          export LIBRARY_PATH=/opt/rocm/lib:/opt/rocm/lib64:${LIBRARY_PATH:-}
          export CPATH=/opt/rocm/include:${CPATH:-}
          export PKG_CONFIG_PATH=/opt/rocm/lib/pkgconfig:${PKG_CONFIG_PATH:-}

          # if present, remove build directory to ensure a clean build with ninja
          if [ -d "build" ]; then
            rm -rf build
          fi
          if [ "${{ matrix.jobs.build-with-ninja }}" = "true" ]; then
            cmake -B build -G Ninja $common_flags $artifacts_flags ${{ matrix.jobs.additional-cmake-flags }}
            cmake --build build -j $(nproc)
          else
            cmake -B build $common_flags $artifacts_flags ${{ matrix.jobs.additional-cmake-flags }}
            cmake --build build --config Release -j $(nproc)
          fi

      - name: Pack artifacts
        run: |
          # Prepare archive directory:
          # - bin for executables
          # - lib for shared libraries
          # - licenses directory
          mkdir -p archive/lib
          mv build/bin/*.so* archive/lib/
          mv build/bin archive/
          cp -r licenses archive/
          cp LICENSE archive/licenses/
          if [ "${{ matrix.jobs.rocm }}" = "true" ]; then
            # For ROCm builds, we need to include the ROCm runtime libraries in the artifact
            cp -a /opt/rocm/lib/*.so* archive/bin/ 2>/dev/null || true
            cp -a /opt/rocm/lib64/*.so* archive/bin/ 2>/dev/null || true
            cp -a /opt/rocm/lib/llvm/lib/*.so* archive/bin/ 2>/dev/null || true
            cp -a /opt/rocm/lib/rocm_sysdeps/lib/*.so* archive/bin/ 2>/dev/null || true
            mkdir -p archive/bin/rocblas
            cp -a /opt/rocm/lib/rocblas/library archive/bin/rocblas/ 2>/dev/null || true
            mkdir -p archive/bin/hipblaslt
            cp -a /opt/rocm/lib/hipblaslt/library archive/bin/hipblaslt/ 2>/dev/null || true
            sudo apt-get install -y patchelf
            cd archive/bin
            for file in *.so* llama-*; do
                [ -f "$file" ] && [ ! -L "$file" ] && patchelf --set-rpath '$ORIGIN' "$file" 2>/dev/null || true
            done
            cd -

            echo "=== ROCm diagnostics: staged archive payload ==="
            du -sh archive/bin archive/lib archive/bin/rocblas archive/bin/hipblaslt 2>/dev/null || true
            echo "archive symlinks: $(find archive -type l | wc -l || true)"
            echo "archive regular files: $(find archive -type f | wc -l || true)"
            echo "top 20 largest staged files:"
            find archive -type f -printf '%s %p\n' | sort -nr | head -20 | awk '{printf "%.1f MB\t%s\n", $1/1024/1024, $2}'
          fi
          # Workaround: llama.cpp expects ggml shared objects in the same directory as executables
          # See issue: https://github.com/ggml-org/llama.cpp/issues/17491
          pushd archive/bin/
          ln -s ../lib/libggml-cpu* ./
          ln -s ../lib/libggml-cuda* ./
          ln -s ../lib/libggml-hip* ./
          popd
          
          # Copy CUDA runtime libraries if built with CUDA
          if [ "${{ matrix.jobs.cuda-toolkit }}" = "true" ]; then
            copy="cp --no-dereference -v {} archive/lib/ "
            find /usr -name "libcudart.so.*" -exec $copy \;
            find /usr -name "libcublas.so.*" -exec $copy \;
            find /usr -name "libcublasLt.so.*" -exec $copy \;
          fi

          tar -C archive -zcvf $ARTIFACT .
          ls -lah $ARTIFACT || true
          echo "compressed artifact size:" && du -h $ARTIFACT || true

      - name: Upload artifact to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT }}
